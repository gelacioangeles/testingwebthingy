<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CookedIn - Sign Up</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

  <nav>
    <a class="logo" href="index.html">Cook<span>edIn</span></a>
    <a class="bell" href="notifications.html" style="text-decoration:none;">🔔<span class="bell-badge">1</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="browse.html">Browse</a>
      <a href="login.html">Login</a>
      <a href="signup.html" class="active">Sign Up</a>
    </div>
  </nav>

  <h1 class="page-title">Create Your Account</h1>

  <div class="card" style="max-width: 860px;">
    <form onsubmit="handleSignUp(event)">
      <div class="form-grid">
        <div class="field">
          <label for="firstName">First name *</label>
          <input type="text" id="firstName" placeholder="">
        </div>
        <div class="field">
          <label for="username">Username *</label>
          <input type="text" id="username" placeholder="">
        </div>
        <div class="field">
          <label for="lastName">Last name *</label>
          <input type="text" id="lastName" placeholder="">
        </div>
        <div class="field">
          <label for="email">Email *</label>
          <input type="email" id="email" placeholder="">
        </div>
        <div class="field">
          <label for="city">City</label>
          <input type="text" id="city" placeholder="">
        </div>
        <div class="field">
          <label for="password">Password *</label>
          <input type="password" id="password" placeholder="">
        </div>
        <div class="field">
          <label for="state">State</label>
          <input type="text" id="state" placeholder="">
        </div>
        <div class="field">
          <label for="confirmPassword">Confirm Password *</label>
          <input type="password" id="confirmPassword" placeholder="">
        </div>
      </div>

      <div class="actions">
        <button type="submit" class="btn-primary">Sign Up</button>
        <div class="divider">or</div>
        <button type="button" class="btn-google">
          <svg class="google-icon" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.1 0 5.6 1.1 7.5 2.8l5.6-5.6C33.5 3.5 29.1 1.5 24 1.5 14.9 1.5 7.2 7 3.8 14.8l6.6 5.1C12.1 13.5 17.5 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.5 24c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8C43.6 36.8 46.5 30.8 46.5 24z"/>
            <path fill="#FBBC05" d="M10.4 28.7A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-6.6-5.1A22.4 22.4 0 0 0 1.5 24c0 3.6.9 7 2.3 10l6.6-5.3z"/>
            <path fill="#34A853" d="M24 46.5c5.1 0 9.4-1.7 12.5-4.6l-7.5-5.8c-2 1.3-4.5 2.1-7 2.1-6.5 0-12-4-14-9.4l-6.6 5.1C7.2 41 14.9 46.5 24 46.5z"/>
          </svg>
          Login with Google
        </button>
        <p class="bottom-link mt12">Already have an <strong>account</strong>? <a href="login.html">Log In</a></p>
      </div>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
