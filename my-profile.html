<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CookedIn - My Profile</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="profile-page">

  <nav>
    <a class="logo" href="index.html">Cook<span>edIn</span></a>
    <a class="bell" href="notifications.html" style="text-decoration:none;">🔔<span class="bell-badge">1</span></a>
    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="browse.html">Browse</a>
      <a href="login.html">Login</a>
      <a href="signup.html">Sign Up</a>
    </div>
  </nav>

  <h1 class="profile-edit-title">My Profile</h1>

  <div class="profile-edit-wrap">

    <div class="profile-avatar">
      <div class="avatar-circle" id="avatarPreview">👤</div>
    </div>

    <form onsubmit="saveProfile(event)">
      <div class="profile-form-grid">
        <div class="field">
          <label>First Name *</label>
          <input type="text" id="firstName" placeholder="Sarah" value="Sarah">
        </div>
        <div class="field">
          <label>Last Name *</label>
          <input type="text" id="lastName" placeholder="Johnson" value="Johnson">
        </div>
      </div>

      <div class="field">
        <label>Username *</label>
        <input type="text" id="username" placeholder="sarahcooks" value="sarahcooks">
      </div>

      <div class="field">
        <label>Email *</label>
        <input type="email" id="email" placeholder="sarah@example.com" value="sarah@example.com">
      </div>

      <div class="profile-form-grid">
        <div class="field">
          <label>City</label>
          <input type="text" id="city" placeholder="New Orleans" value="New Orleans">
        </div>
        <div class="field">
          <label>State</label>
          <input type="text" id="state" placeholder="Louisiana" value="Louisiana">
        </div>
      </div>

      <div class="field">
        <label>About Me</label>
        <textarea id="about" placeholder="Add something about yourself...."></textarea>
      </div>

      <div class="field">
        <label>Profile Image</label>
        <input type="text" id="profileImage" placeholder="https://...">
      </div>

      <div class="profile-btn-row">
        <button type="submit" class="btn-save">Save Changes</button>
        <button type="button" class="btn-cancel" onclick="window.location.href='dashboard.html'">Cancel</button>
      </div>
    </form>
  </div>

  <script src="script.js"></script>
  <script>
    function saveProfile(e) {
      e.preventDefault();
      const img = document.getElementById('profileImage').value;
      if (img) {
        document.getElementById('avatarPreview').innerHTML = `<img src="${img}" alt="avatar">`;
      }
      window.location.href = 'dashboard.html';
    }

    // The avatar preview.
    document.getElementById('profileImage').addEventListener('input', function() {
      if (this.value) {
        document.getElementById('avatarPreview').innerHTML = `<img src="${this.value}" alt="avatar">`;
      } else {
        document.getElementById('avatarPreview').innerHTML = '👤';
      }
    });
  </script>
</body>
</html>
