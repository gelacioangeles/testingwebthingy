<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CookedIn - My Favorites</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="favorites-page">

  <nav>
    <a class="logo" href="index.html">Cook<span>edIn</span></a>
    <a class="bell" href="notifications.html" style="text-decoration:none;">🔔<span class="bell-badge">1</span></a>
    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="browse.html">Browse</a>
      <a href="login.html">Login</a>
      <a href="signup.html">Sign Up</a>
    </div>
  </nav>

  <h1 class="favorites-title">My Favorites (3)</h1>

  <div class="favorites-list">

    <div class="fav-card">
      <div class="fav-card-img">
        <img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=900&q=80" alt="Creole Gumbo">
        <button class="fav-heart" onclick="removeFav(this, 'Creole Gumbo')">♥</button>
      </div>
      <div class="fav-card-body">
        <h3>Creole Gumbo</h3>
        <div class="stars">★★★★★</div>
        <div class="rating-count">1,386 Ratings</div>
      </div>
      <a class="btn-view-fav" href="recipe-detail.html">View Recipe</a>
    </div>

    <div class="fav-card">
      <div class="fav-card-img">
        <img src="https://images.unsplash.com/photo-1604908177453-7462950a6a3b?w=900&q=80" alt="Shrimp Étouffée">
        <button class="fav-heart" onclick="removeFav(this, 'Shrimp Étouffée')">♥</button>
      </div>
      <div class="fav-card-body">
        <h3>Shrimp Étouffée</h3>
        <div class="stars">★★★★☆</div>
        <div class="rating-count">659 Ratings</div>
      </div>
      <a class="btn-view-fav" href="recipe-detail.html">View Recipe</a>
    </div>

    <div class="fav-card">
      <div class="fav-card-img">
        <img src="https://images.unsplash.com/photo-1574484284002-952d92456975?w=900&q=80" alt="Best Jambalaya">
        <button class="fav-heart" onclick="removeFav(this, 'Best Jambalaya')">♥</button>
      </div>
      <div class="fav-card-body">
        <h3>Best Jambalaya</h3>
        <div class="stars">★★★★☆</div>
        <div class="rating-count">1,241 Ratings</div>
      </div>
      <a class="btn-view-fav" href="recipe-detail.html">View Recipe</a>
    </div>

  </div>

  <script src="script.js"></script>
  <script>
    function removeFav(btn, name) {
      if (confirm(`Remove "${name}" from favorites?`)) {
        btn.closest('.fav-card').remove();
        updateFavCount();
      }
    }
    function updateFavCount() {
      const count = document.querySelectorAll('.fav-card').length;
      document.querySelector('.favorites-title').textContent = `My Favorites (${count})`;
    }
  </script>
</body>
</html>
