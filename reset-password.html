<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CookedIn - Reset Password</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

  <nav>
    <a class="logo" href="index.html">Cook<span>edIn</span></a>
    <a class="bell" href="notifications.html" style="text-decoration:none;">🔔<span class="bell-badge">1</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="browse.html">Browse</a>
      <a href="login.html">Login</a>
      <a href="signup.html">Sign Up</a>
    </div>
  </nav>

  <h1 class="page-title">Reset Password</h1>

  <div class="card" style="max-width: 600px;">
    <p class="desc">Enter your email address and we'll send you a link to reset your password.</p>
    <form onsubmit="handleResetRequest(event)">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="">
      </div>
      <button type="submit" class="btn-primary mt16">Submit</button>
    </form>
    <p class="bottom-link mt12"><a href="login.html">Back to Login</a></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
